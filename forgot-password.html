<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhyanSanchay - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .forgot-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 40px 20px;
        }
        .forgot-card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .forgot-card h2 { margin-bottom: 10px; color: #333; }
        .forgot-card p { 
            font-size: 14px; 
            color: #666; 
            margin-bottom: 20px; 
            line-height: 1.5;
        }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background-color: #dc3545; /* Red color for alerts/reset */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .reset-btn:hover { background-color: #c82333; }
        .back-to-login { 
            margin-top: 20px; 
            font-size: 14px; 
        }
        .back-to-login a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="logo-area">
                <a href="index.html">
                    <img src="logo.png" alt="Logo" class="site-logo">
                    <span class="logo-text">Ghyan<span>Sanchay</span></span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
      <div class="header-action">
                <a href="login.html" class="nav-login-btn">Login</a>
            </div>
    <div class="container">
        <main class="content">
            <div class="forgot-wrapper">
                <div class="forgot-card">
                    <h2>Password Bhool Gaye?</h2>
                    <p>Apna registered Email ya Mobile Number enter karein. Hum aapko password reset karne ka link bhejenge.</p>
                    
                    <form id="forgotForm">
                        <div class="input-group">
                            <input type="text" id="reset-identifier" placeholder="Email ya Mobile No." required>
                        </div>
                        <button type="submit" class="reset-btn">OTP Bhejein</button>
                    </form>

                    <div class="back-to-login">
                        <a href="login.html">← Wapas Login par jayein</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 GhyanSanchay. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const val = document.getElementById('reset-identifier').value;
            alert("Reset link/OTP aapke " + val + " par bhej diya gaya hai.");
        });
    </script>
</body>
</html>
