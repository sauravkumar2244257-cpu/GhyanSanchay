<!DOCTYPE html>
<html lang="hi">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="YHxliyiuN0vMyvrulU1vr2tAeAIIh9qqgD-xkfaFFBc" />
    <title>My Professional Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="main-header">
    <nav class="navbar">
        <div class="logo-area">
            <a href="index.html">
                <img src="logo.png" alt="MyBlogsLogo" class="site-logo">
                <span class="logo-text"><span>GhyanSanchay</span></span>
            </a>
        </div>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="all-blogs.html">All Blogs</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>
    <div class="container">
            <main class="content">
    <article class="full-post">
        <img id="post-image" src="" alt="" class="blog-img">
        <h1 id="post-title">Blog Ka Title</h1>
        <p class="meta" id="post-date"></p>
        <div id="post-content">
            </div>

        <div class="post-card">
    <h3 style="margin-top:0">Aapka Post Content Yahan Hoga</h3>
    <p style="color:#666">Like aur Comment karke batayein kaisa laga!</p>

    <div class="action-bar">
        <div class="btn-group">
            <button id="likeBtn" class="btn" onclick="handleLike()">
                <i class="fa-regular fa-thumbs-up"></i> <span id="likeText">Like</span>
            </button>
            <button id="dislikeBtn" class="btn" onclick="handleDislike()">
                <i class="fa-regular fa-thumbs-down"></i>
            </button>
            <button class="btn" onclick="toggleComment()">
                <i class="fa-regular fa-comment"></i>
            </button>
        </div>
        
        <button id="subBtn" class="btn sub-btn" onclick="handleSubscribe()">
            Subscribe
        </button>
    </div>

    <div id="commentSection" class="comment-section">
        <div class="comment-input-area">
            <textarea id="commentInput" rows="1" placeholder="Add a comment..."></textarea>
            <button class="send-btn" onclick="submitComment()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <div id="commentDisplay"></div>
    </div>
</div>

    </article>
</main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 MyBrand Website. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
