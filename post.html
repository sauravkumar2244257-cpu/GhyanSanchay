<style>
    :root {
        --primary-blue: #007bff;
        --danger-red: #ff4757;
        --dark-gray: #2f3542;
        --light-bg: #f1f2f6;
    }

    body { font-family: 'Poppins', sans-serif; background: #eef1f7; padding: 0px; }

    /* Main Container */
    .post-card {
        background: white;
        padding: 5px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        max-width: auto;
        margin: auto;
    }

    .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid #eee;
        padding-top: 15px;
    }

    /* Modern Button Styling */
    .btn-group { display: flex; gap: 8px; }

    .btn {
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        background: var(--light-bg);
        color: var(--dark-gray);
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* Active States */
    .btn.active-like { background: var(--primary-blue); color: white; }
    .btn.active-dislike { background: var(--danger-red); color: white; }
    
    /* Subscribe Button Special */
    .sub-btn {
        background: #000;
        color: white;
        border-radius: 20px;
        padding: 10px 20px;
    }
    
    .sub-btn.subscribed {
        background: #bdc3c7;
        color: #333;
    }

    /* Comment Section Styling */
    .comment-section {
        margin-top: 20px;
        display: none;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .comment-input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    textarea {
        flex: 1;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 10px;
        resize: none;
        outline: none;
        transition: border-color 0.3s;
    }

    textarea:focus { border-color: var(--primary-blue); }

    .send-btn {
        background: var(--primary-blue);
        color: white;
        border: none;
        padding: 0 15px;
        border-radius: 10px;
        cursor: pointer;
    }

    /* Comment List */
    #commentDisplay {
        max-height: 250px;
        overflow-y: auto;
    }

    .single-comment {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        border-left: 4px solid var(--primary-blue);
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
    }
    </style>

    <script>
    // Like/Dislike Logic
    function handleLike() {
        const lb = document.getElementById('likeBtn');
        const db = document.getElementById('dislikeBtn');
        lb.classList.toggle('active-like');
        db.classList.remove('active-dislike');
        
        document.getElementById('likeText').innerText = lb.classList.contains('active-like') ? "Liked" : "Like";
    }

    function handleDislike() {
        const lb = document.getElementById('likeBtn');
        const db = document.getElementById('dislikeBtn');
        db.classList.toggle('active-dislike');
        lb.classList.remove('active-like');
        document.getElementById('likeText').innerText = "Like";
    }

    // Subscribe Logic
    function handleSubscribe() {
        const sb = document.getElementById('subBtn');
        sb.classList.toggle('subscribed');
        sb.innerText = sb.classList.contains('subscribed') ? "Subscribed" : "Subscribe";
    }

    // Comment Toggle
    function toggleComment() {
        const cs = document.getElementById('commentSection');
        cs.style.display = (cs.style.display === "block") ? "none" : "block";
    }

    // Post Comment Logic
    function submitComment() {
        const input = document.getElementById('commentInput');
        const display = document.getElementById('commentDisplay');
        
        if(input.value.trim() !== "") {
            const div = document.createElement('div');
            div.className = 'single-comment';
            div.innerHTML = `<strong>User:</strong> ${input.value}`;
            display.prepend(div);
            input.value = "";
        }
    }
</script>
