<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="YHxliyiuN0vMyvrulU1vr2tAeAIIh9qqgD-xkfaFFBc" />
    <title>GhyanSanchay - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Login specific styling jo content area mein fit ho */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff; /* Aapke theme ke hisaab se change karein */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .login-btn:hover { opacity: 0.9; }
        .extra-links { margin-top: 15px; font-size: 13px; }
        .extra-links a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="logo-area">
                <a href="index.html">
                    <img src="logo.png" alt="Logo" class="site-logo">
                    <span class="logo-text">Ghyan<span>Sanchay</span></span>
                </a>
            </div>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="menu-icon">&#9776;</label>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <main class="content">
            <div class="login-wrapper">
                <div class="login-card">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <div class="input-group">
                            <input type="text" id="identifier" placeholder="Mobile Number ya Email ID" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="login-btn">Login</button>
                    </form>
                    <div class="extra-links">
                        <a href="#">Forgot Password?</a> | 
                        <span>Naya Account? <a href="#">Register karein</a></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 GhyanSanchay. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            
            // Basic Logic: Check if Email or Phone
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phonePattern = /^[0-9]{10}$/;

            if (emailPattern.test(identifier)) {
                alert("Email ke saath login ho raha hai...");
            } else if (phonePattern.test(identifier)) {
                alert("Mobile number ke saath login ho raha hai...");
            } else {
                alert("Kripya sahi Email ya 10 digit ka Mobile Number enter karein.");
            }
        });
    </script>
</body>
</html>
